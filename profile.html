<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - G4MEXCHANGE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="navbar">
        <a href="dashboard.html" class="logo">
            <i class="fas fa-gamepad"></i>
            <h2>G4M<span>EXCHANGE</span></h2>
        </a>
        <div class="nav-controls">
            <div class="role-badge" id="roleBadge">
                <i class="fas fa-user-tag"></i>
                <span id="roleText">BUYER</span>
            </div>
            <button class="logout-btn-nav" id="logoutButtonNav">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
            <div class="user-menu">
                <i class="fas fa-user-circle" style="color: white; font-size: 24px;"></i>
                <span style="color: white;" id="userName"></span>
                <i class="fas fa-chevron-down" style="color: white; font-size: 12px;"></i>
                <div class="dropdown">
                    <a href="profile.html"><i class="fas fa-user"></i> My Profile</a>
                    <a href="wallet.html"><i class="fas fa-wallet"></i> My Wallet</a>
                    <a href="transactions.html"><i class="fas fa-history"></i> Transactions</a>
                    <a href="myitems.html"><i class="fas fa-box"></i> My Items</a>
                    <hr>
                    <a id="logoutDropdownBtn" style="color: #DC143C; font-weight: 600;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li onclick="window.location.href='dashboard.html'" id="menu-dashboard">
                    <i class="fas fa-chart-line"></i> Dashboard
                </li>
                <li onclick="window.location.href='marketplace.html'" id="menu-marketplace">
                    <i class="fas fa-store"></i> Marketplace
                </li>
                <li onclick="window.location.href='profile.html'" id="menu-profile" class="active">
                    <i class="fas fa-user-circle"></i> My Profile
                </li>
                <li onclick="window.location.href='wallet.html'" id="menu-wallet">
                    <i class="fas fa-wallet"></i> Wallet
                </li>
                <li onclick="window.location.href='transactions.html'" id="menu-transactions">
                    <i class="fas fa-history"></i> Transaction History
                </li>
                <li onclick="window.location.href='myitems.html'" id="menu-myitems">
                    <i class="fas fa-box"></i> My Items
                </li>
            </ul>
        </div>

        <div class="content-area">
            <div class="profile-section">
                <div class="profile-header">
                    <div class="profile-avatar"><i class="fas fa-user"></i></div>
                    <div class="profile-info">
                        <h2 id="profileName"></h2>
                        <p><i class="fas fa-envelope"></i> <span id="profileEmail"></span></p>
                        <p><i class="fas fa-phone"></i> <span id="profilePhone"></span></p>
                        <p><i class="fas fa-map-marker-alt"></i> <span id="profileLocation"></span></p>
                        <div class="trust-badge" id="trustBadge">Trust Score: 0</div>
                    </div>
                </div>
                <h3><i class="fas fa-edit"></i> Edit Profile</h3>
                <div class="form-grid">
                    <input type="text" id="editFullName" placeholder="Full Name">
                    <input type="tel" id="editPhone" placeholder="Phone">
                    <input type="text" id="editCity" placeholder="City">
                    <input type="text" id="editState" placeholder="State">
                    <select id="editPlatform">
                        <option value="">Select Platform</option>
                        <option value="PlayStation">PlayStation</option>
                        <option value="Xbox">Xbox</option>
                        <option value="Nintendo">Nintendo</option>
                        <option value="PC">PC</option>
                    </select>
                    <input type="text" id="editGame" placeholder="Favorite Game">
                </div>
                <button class="btn-primary" onclick="updateProfile()" style="margin-top: 20px;"><i class="fas fa-save"></i> Save Changes</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let currentUser = null;

        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/'; }
        currentUser = JSON.parse(localStorage.getItem('user'));
        
        document.getElementById('userName').textContent = currentUser.full_name || currentUser.username;
        
        let currentRole = localStorage.getItem('userRole') || currentUser.role || 'buyer';
        document.getElementById('roleText').textContent = currentRole.toUpperCase();
        
        const roleBadge = document.getElementById('roleBadge');
        if (currentRole === 'seller') {
            roleBadge.style.background = '#28a745';
        } else {
            roleBadge.style.background = '#FFD700';
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                sessionStorage.clear();
                showToast('Logged out successfully!', 'success');
                setTimeout(() => { window.location.href = '/'; }, 1000);
            }
        }

        document.getElementById('logoutButtonNav').addEventListener('click', logout);
        document.getElementById('logoutDropdownBtn').addEventListener('click', logout);

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        async function loadUserData() {
            try {
                const response = await fetch(`${API_URL}/users/${currentUser.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('profileName').textContent = user.full_name;
                    document.getElementById('profileEmail').textContent = user.email;
                    document.getElementById('profilePhone').textContent = user.phone;
                    document.getElementById('profileLocation').textContent = `${user.city || ''} ${user.state || ''}`.trim() || 'Not specified';
                    
                    let trustLevel = '';
                    if (user.trust_score <= 20) trustLevel = 'Newbie';
                    else if (user.trust_score <= 40) trustLevel = 'Trusted';
                    else if (user.trust_score <= 60) trustLevel = 'Verified';
                    else if (user.trust_score <= 80) trustLevel = 'Elite';
                    else trustLevel = 'Legendary';
                    
                    document.getElementById('trustBadge').innerHTML = `Trust Score: ${user.trust_score || 0}/100 <i class="fas fa-star" style="color: #FFD700;"></i><br><small>${trustLevel} Level</small>`;
                    
                    document.getElementById('editFullName').value = user.full_name;
                    document.getElementById('editPhone').value = user.phone;
                    document.getElementById('editCity').value = user.city || '';
                    document.getElementById('editState').value = user.state || '';
                    document.getElementById('editPlatform').value = user.gaming_platform || '';
                    document.getElementById('editGame').value = user.preferred_game || '';
                }
            } catch (error) { console.error(error); }
        }

        async function updateProfile() {
            const updates = {
                full_name: document.getElementById('editFullName').value,
                phone: document.getElementById('editPhone').value,
                city: document.getElementById('editCity').value,
                state: document.getElementById('editState').value,
                gaming_platform: document.getElementById('editPlatform').value,
                preferred_game: document.getElementById('editGame').value
            };
            try {
                const response = await fetch(`${API_URL}/users/${currentUser.id}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(updates)
                });
                if (response.ok) {
                    showToast('Profile updated!', 'success');
                    loadUserData();
                    currentUser.full_name = updates.full_name;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    document.getElementById('userName').textContent = currentUser.full_name;
                }
            } catch (error) { showToast('Error', 'error'); }
        }

        loadUserData();
    </script>
</body>
</html>
