<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4MEXCHANGE - Login or Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f0e8 0%, #fff5eb 50%, #f0ebe3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #DC143C;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px;
            width: 100%;
            max-width: 550px;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.6s ease-out;
        }
        .container:hover { transform: translateY(-5px); box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 60px; color: #DC143C; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .logo-text { font-size: 32px; font-weight: 800; color: #8B0000; }
        .logo-text .gold { color: #DAA520; }
        .tagline { color: #666; font-size: 14px; }
        .toggle-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: #f5f0e8;
            padding: 5px;
            border-radius: 50px;
        }
        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            color: #666;
        }
        .toggle-btn.active {
            background: linear-gradient(135deg, #DC143C, #8B0000);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.3);
            transform: scale(1.02);
        }
        .form-container { display: none; }
        .form-container.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .form-container h2 { text-align: center; color: #8B0000; margin-bottom: 25px; font-size: 24px; }
        .form-container h2 i { margin-right: 10px; color: #DAA520; }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #DC143C;
            font-size: 16px;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e8e0d8;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            background: #faf8f5;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #DC143C;
            box-shadow: 0 0 0 3px rgba(220, 20, 60, 0.1);
            transform: translateY(-2px);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #DC143C, #8B0000);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(220, 20, 60, 0.4); }
        .demo-note {
            margin-top: 20px;
            padding: 12px;
            background: #fff8f0;
            border-radius: 10px;
            font-size: 13px;
            color: #856404;
            text-align: center;
            border-left: 4px solid #DAA520;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 350px;
        }
        .toast.success { background: #28a745; }
        .toast.error { background: #DC143C; }
        .toast.hidden { display: none; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 600px) { .container { padding: 25px; } .form-row { grid-template-columns: 1fr; gap: 0; } }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="logo-container">
            <i class="fas fa-gamepad logo-icon"></i>
            <h1 class="logo-text">G4M<span class="gold">EXCHANGE</span></h1>
            <p class="tagline">Trade. Rent. Conquer.</p>
        </div>

        <div class="toggle-container">
            <button class="toggle-btn active" id="loginTab">Login</button>
            <button class="toggle-btn" id="registerTab">Register</button>
        </div>

        <div id="loginForm" class="form-container active">
            <h2><i class="fas fa-sign-in-alt"></i> Welcome Back!</h2>
            <form id="loginFormElement">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUsername" placeholder="Username or Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-arrow-right"></i> Login
                </button>
            </form>
            <div class="demo-note">
                <i class="fas fa-info-circle"></i> Demo: "gamer_alex" / "demo123"
            </div>
        </div>

        <div id="registerForm" class="form-container">
            <h2><i class="fas fa-user-plus"></i> Create Account</h2>
            <form id="registerFormElement">
                <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regFullName" placeholder="Full Name *" required></div>
                <div class="input-group"><i class="fas fa-at"></i><input type="text" id="regUsername" placeholder="Username *" required></div>
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Email Address *" required></div>
                <div class="input-group"><i class="fas fa-phone"></i><input type="tel" id="regPhone" placeholder="Phone Number *" required></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Password * (min 6 characters)" required></div>
                <div class="input-group"><i class="fas fa-city"></i><input type="text" id="regCity" placeholder="City"></div>
                <div class="input-group">
                    <i class="fas fa-gamepad"></i>
                    <select id="regPlatform">
                        <option value="">Gaming Platform (optional)</option>
                        <option value="PlayStation">PlayStation</option>
                        <option value="Xbox">Xbox</option>
                        <option value="Nintendo">Nintendo Switch</option>
                        <option value="PC">PC Gaming</option>
                    </select>
                </div>
                <div class="input-group"><i class="fas fa-trophy"></i><input type="text" id="regGame" placeholder="Favorite Game (optional)"></div>
                <button type="submit" class="btn-primary"><i class="fas fa-check-circle"></i> Register</button>
            </form>
            <div class="terms">By registering, you agree to our Terms of Service</div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = 15 + Math.random() * 10 + 's';
                particle.style.width = Math.random() * 6 + 2 + 'px';
                particle.style.height = particle.style.width;
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
        });

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) { showToast('Please fill all fields', 'error'); return; }
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('userRole', data.user.role || 'buyer');
                    showToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showToast(data.error || 'Login failed', 'error');
                }
            } catch (error) { showToast('Network error. Is the server running?', 'error'); }
        });

        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const full_name = document.getElementById('regFullName').value;
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const city = document.getElementById('regCity').value;
            const gaming_platform = document.getElementById('regPlatform').value;
            const preferred_game = document.getElementById('regGame').value;
            
            if (!full_name || !username || !email || !phone || !password) { showToast('Please fill all required fields', 'error'); return; }
            if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
            
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, username, email, phone, password, city, gaming_platform, preferred_game })
                });
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('userRole', 'buyer');
                    showToast('Registration successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showToast(data.error || 'Registration failed', 'error');
                }
            } catch (error) { showToast('Network error', 'error'); }
        });
    </script>
</body>
</html>
