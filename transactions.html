<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - G4MEXCHANGE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .transactions-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }
        .transactions-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        .transactions-table th {
            background: linear-gradient(135deg, #8B0000, #DC143C);
            color: white;
            padding: 15px;
            font-weight: 600;
            text-align: left;
        }
        .transactions-table td {
            padding: 15px;
            border-bottom: 1px solid #f0e8e0;
        }
        .transactions-table tr:hover {
            background: #faf8f5;
        }
        .status-completed { color: #28a745; font-weight: 600; }
        .status-pending { color: #ffc107; font-weight: 600; }
        .status-cancelled { color: #dc3545; font-weight: 600; }
        .status-returned { color: #17a2b8; font-weight: 600; }
        .action-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }
        .action-btn.return { background: #28a745; color: white; }
        .action-btn.remove { background: #dc3545; color: white; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i { font-size: 64px; color: #ddd; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="navbar">
        <a href="dashboard.html" class="logo">
            <i class="fas fa-gamepad"></i>
            <h2>G4M<span>EXCHANGE</span></h2>
        </a>
        <div class="nav-controls">
            <div class="role-badge" id="roleBadge">
                <i class="fas fa-user-tag"></i>
                <span id="roleText">BUYER</span>
            </div>
            <button class="logout-btn-nav" id="logoutButtonNav">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
            <div class="user-menu">
                <i class="fas fa-user-circle" style="color: white; font-size: 24px;"></i>
                <span style="color: white;" id="userName"></span>
                <i class="fas fa-chevron-down" style="color: white; font-size: 12px;"></i>
                <div class="dropdown">
                    <a href="profile.html"><i class="fas fa-user"></i> My Profile</a>
                    <a href="wallet.html"><i class="fas fa-wallet"></i> My Wallet</a>
                    <a href="transactions.html"><i class="fas fa-history"></i> Transactions</a>
                    <a href="myitems.html"><i class="fas fa-box"></i> My Items</a>
                    <hr>
                    <a id="logoutDropdownBtn" style="color: #DC143C; font-weight: 600;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li onclick="window.location.href='dashboard.html'" id="menu-dashboard">
                    <i class="fas fa-chart-line"></i> Dashboard
                </li>
                <li onclick="window.location.href='marketplace.html'" id="menu-marketplace">
                    <i class="fas fa-store"></i> Marketplace
                </li>
                <li onclick="window.location.href='profile.html'" id="menu-profile">
                    <i class="fas fa-user-circle"></i> My Profile
                </li>
                <li onclick="window.location.href='wallet.html'" id="menu-wallet">
                    <i class="fas fa-wallet"></i> Wallet
                </li>
                <li onclick="window.location.href='transactions.html'" id="menu-transactions" class="active">
                    <i class="fas fa-history"></i> Transaction History
                </li>
                <li onclick="window.location.href='myitems.html'" id="menu-myitems">
                    <i class="fas fa-box"></i> My Items
                </li>
            </ul>
        </div>

        <div class="content-area">
            <div class="transactions-container">
                <h3><i class="fas fa-history"></i> All Transactions</h3>
                <div style="overflow-x: auto; margin-top: 20px;">
                    <table class="transactions-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Item</th>
                                <th>Platform</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Rental Period</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsList">
                            <tr><td colspan="8"><div class="empty-state"><i class="fas fa-inbox"></i><p>No transactions yet</p></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let currentUser = null;

        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/'; }
        currentUser = JSON.parse(localStorage.getItem('user'));
        
        document.getElementById('userName').textContent = currentUser.full_name || currentUser.username;
        
        let currentRole = localStorage.getItem('userRole') || currentUser.role || 'buyer';
        document.getElementById('roleText').textContent = currentRole.toUpperCase();
        
        const roleBadge = document.getElementById('roleBadge');
        if (currentRole === 'seller') {
            roleBadge.style.background = '#28a745';
        } else {
            roleBadge.style.background = '#FFD700';
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                sessionStorage.clear();
                showToast('Logged out successfully!', 'success');
                setTimeout(() => { window.location.href = '/'; }, 1000);
            }
        }

        document.getElementById('logoutButtonNav').addEventListener('click', logout);
        document.getElementById('logoutDropdownBtn').addEventListener('click', logout);

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        function escapeHtml(str) { 
            if (!str) return ''; 
            return str.replace(/[&<>]/g, function(m) { 
                if (m === '&') return '&amp;'; 
                if (m === '<') return '&lt;'; 
                if (m === '>') return '&gt;'; 
                return m; 
            }); 
        }

        async function loadTransactions() {
            try {
                const response = await fetch(`${API_URL}/users/${currentUser.id}/transactions`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const transactions = await response.json();
                const tbody = document.getElementById('transactionsList');
                
                if (transactions.length === 0) { 
                    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><i class="fas fa-inbox"></i><p>No transactions yet</p><a href="marketplace.html" class="btn-primary" style="margin-top: 15px; display: inline-block;">Browse Marketplace</a></div></td></tr>';
                    return; 
                }
                
                tbody.innerHTML = transactions.map(t => {
                    const isActive = t.trans_status === 'completed';
                    const rentalPeriod = t.rent_start_date && t.rent_end_date ? `${t.rent_start_date} to ${t.rent_end_date}` : '-';
                    return `
                        <tr>
                            <td>${new Date(t.created_at).toLocaleDateString()}</td>
                            <td><strong>${escapeHtml(t.item_title)}</strong></td>
                            <td>${t.console_type || '-'}</td>
                            <td>${t.transaction_type === 'buy' ? 'Purchase' : 'Rental'}</td>
                            <td><strong>$${parseFloat(t.amount).toFixed(2)}</strong></td>
                            <td>${rentalPeriod}</td>
                            <td class="status-${t.trans_status}">${t.trans_status}</td>
                            <td>${isActive ? `<button class="action-btn ${t.transaction_type === 'rent' ? 'return' : 'remove'}" onclick="returnItem(${t.id}, '${t.transaction_type}')">${t.transaction_type === 'rent' ? 'Return' : 'Remove'}</button>` : '-'}</td>
                        </tr>
                    `;
                }).join('');
            } catch (error) { 
                console.error(error);
            }
        }

        async function returnItem(transactionId, type) {
            const action = type === 'rent' ? 'return this item' : 'remove this item from history';
            if (!confirm(`Are you sure you want to ${action}?`)) return;
            
            try {
                const response = await fetch(`${API_URL}/transactions/${transactionId}/return`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ user_id: currentUser.id })
                });
                const data = await response.json();
                if (response.ok) {
                    if (type === 'rent') {
                        await fetch(`${API_URL}/users/${currentUser.id}/update-trust`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ action: 'on_time_return' })
                        });
                        showToast(data.message + ' +4 Trust points!', 'success');
                    } else {
                        showToast(data.message, 'success');
                    }
                    loadTransactions();
                } else {
                    showToast(data.error, 'error');
                }
            } catch (error) {
                showToast('Error processing request', 'error');
            }
        }

        loadTransactions();
    </script>
</body>
</html>
